services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # PostgreSQL NO expone puerto al host en producción — solo accesible dentro de la red Docker
    # Para acceso local en desarrollo: descomentar la siguiente línea
    # ports:
    #   - "127.0.0.1:54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  dashboard-api:
    build:
      context: .
      dockerfile: apps/dashboard-api/Dockerfile
    restart: unless-stopped
    # Puerto externo no estándar — cambiar si es necesario
    ports:
      - "${API_PORT:-8741}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNC: ${DB_SYNC:-false}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      SEED_ENABLED: ${SEED_ENABLED:-false}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8742}
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      CHATBOT_API_INTERNAL_KEY: ${CHATBOT_API_INTERNAL_KEY}
      DOCUMENT_API_INTERNAL_KEY: ${DOCUMENT_API_INTERNAL_KEY}
      WHATSAPP_QR_INTERNAL_KEY: ${WHATSAPP_QR_INTERNAL_KEY}
      DASHBOARD_TO_DOCUMENT_KEY: ${DASHBOARD_TO_DOCUMENT_KEY}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-denunciasAt}
      # URL interna del whatsapp-service para leer QR desde Redis
      WHATSAPP_SERVICE_URL: http://whatsapp-service:3003
      # URL interna del document-service (ya no se usa para proxy, solo para fire-and-forget)
      DOCUMENT_SERVICE_URL: http://document-service:3004
      # URL interna del notification-service
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      # URL interna del rag-service para base de conocimiento semántica
      RAG_SERVICE_URL: http://rag-service:3006
      # MinIO para servir .docx al frontend
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_DOCUMENTOS: denunciasat-documentos
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  evolution-api:
    # Pinear versión explícita — :latest puede traer versiones inestables
    image: atendai/evolution-api:v2.2.3
    restart: unless-stopped
    # Parche @lid: aplicar antes de arrancar el servidor (ver infrastructure/evolution-api/patch-lid.js)
    entrypoint: ["/bin/bash", "-c", "node /patches/patch-lid.js && . ./Docker/scripts/deploy_database.sh && npm run start:prod"]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # IMPORTANTE: el valor DEBE tener formato UUID (xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)
      # Si no es UUID, Evolution API lo ignora y genera su propia clave aleatoria
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      # Base de datos (Evolution API v2 requiere DB_PROVIDER explícito)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      # Redis para caché de sesiones
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      # Webhook al whatsapp-service
      WEBHOOK_GLOBAL_URL: http://whatsapp-service:3003/webhook
      WEBHOOK_GLOBAL_ENABLED: "true"
      # Websockets (Evolution API v2)
      WEBSOCKET_ENABLED: "true"
      WEBSOCKET_GLOBAL_EVENTS: "true"
      CONFIG_SESSION_PHONE_CLIENT: "Ubuntu"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      # Sobreescribe el valor hardcoded del .env interno del imagen (2.3000.1015901307)
      # Actualizar cuando WA rechace con statusReason: 408/401:
      # https://raw.githubusercontent.com/WhiskeySockets/Baileys/master/src/Defaults/baileys-version.json
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035194821"
    volumes:
      - evolution_data:/evolution/instances
      - ./infrastructure/evolution-api:/patches:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  whatsapp-service:
    build:
      context: .
      dockerfile: apps/whatsapp-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-denunciasAt}
      CHATBOT_SERVICE_URL: http://chatbot-service:3002
      # dashboard-api se referencia por puerto INTERNO Docker (3000), no por el host (8741)
      DASHBOARD_API_URL: http://dashboard-api:3000
      # Redis para almacenar QR temporalmente (TTL 90s)
      REDIS_URL: redis://redis:6379
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      WHATSAPP_QR_INTERNAL_KEY: ${WHATSAPP_QR_INTERNAL_KEY}
      WHATSAPP_TO_CHATBOT_KEY: ${WHATSAPP_TO_CHATBOT_KEY}
      WHATSAPP_WEBHOOK_HMAC_SECRET: ${WHATSAPP_WEBHOOK_HMAC_SECRET}
      # MinIO para subir evidencias inmediatamente (las URLs de Evolution API expiran)
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_EVIDENCIAS: denunciasat-evidencias
      ALLOWED_REMOTE_MEDIA_HOSTS: ${ALLOWED_REMOTE_MEDIA_HOSTS:-evolution-api}
    depends_on:
      evolution-api:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  chatbot-service:
    build:
      context: .
      dockerfile: apps/chatbot-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_URL: redis://redis:6379
      # dashboard-api se referencia por puerto INTERNO Docker (3000), no por el host (8741)
      DASHBOARD_API_URL: http://dashboard-api:3000
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      CHATBOT_API_INTERNAL_KEY: ${CHATBOT_API_INTERNAL_KEY}
      WHATSAPP_TO_CHATBOT_KEY: ${WHATSAPP_TO_CHATBOT_KEY}
      RAG_SERVICE_URL: http://rag-service:3006
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER}
      DOCUMENT_SERVICE_URL: http://document-service:3004
    depends_on:
      redis:
        condition: service_healthy
      dashboard-api:
        condition: service_healthy
      rag-service:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  document-service:
    build:
      context: .
      dockerfile: apps/document-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DASHBOARD_API_URL: http://dashboard-api:3000
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      DOCUMENT_API_INTERNAL_KEY: ${DOCUMENT_API_INTERNAL_KEY}
      DASHBOARD_TO_DOCUMENT_KEY: ${DASHBOARD_TO_DOCUMENT_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # MinIO para guardar .docx generados y leer imágenes de evidencia
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_EVIDENCIAS: denunciasat-evidencias
      MINIO_BUCKET_DOCUMENTOS: denunciasat-documentos
      ALLOWED_REMOTE_MEDIA_HOSTS: ${ALLOWED_REMOTE_MEDIA_HOSTS:-evolution-api}
      ALLOW_EXTERNAL_IMAGE_URLS: ${ALLOW_EXTERNAL_IMAGE_URLS:-false}
    depends_on:
      dashboard-api:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb local/denunciasat-evidencias --ignore-existing &&
      mc mb local/denunciasat-documentos --ignore-existing &&
      echo 'Buckets creados correctamente'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    restart: on-failure

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-denunciasAt}
    depends_on:
      evolution-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  rag-service:
    build:
      context: .
      dockerfile: apps/rag-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT:-5432}/${DB_NAME}
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Puerto externo no estándar — cambiar si es necesario
    ports:
      - "${FRONTEND_PORT:-8742}:3001"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3001"
      NODE_ENV: production
      # URL interna (servidor Next.js → API dentro de la red Docker)
      NEXT_PUBLIC_API_URL: http://dashboard-api:3000
      # URL pública usada por el navegador para WebSocket del dashboard-api
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:8741}
    depends_on:
      dashboard-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  evolution_data:
  minio_data:

networks:
  default:
    name: denunciasat_network
