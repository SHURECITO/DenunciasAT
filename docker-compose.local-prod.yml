# LOCAL PROD TESTING — mirrors docker-compose.prod.yml con builds locales
# Uso: docker compose -f docker-compose.local-prod.yml up --build
# Requiere .env en la raíz del proyecto

x-service-defaults: &service-defaults
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    <<: *service-defaults
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  dashboard-api:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/dashboard-api/Dockerfile
    ports:
      - "${API_PORT:-8741}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SYNC: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      SEED_ENABLED: ${SEED_ENABLED:-false}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SWAGGER_ENABLED: "false"
      FRONTEND_URL: ${FRONTEND_URL}
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      CHATBOT_API_INTERNAL_KEY: ${CHATBOT_API_INTERNAL_KEY}
      DOCUMENT_API_INTERNAL_KEY: ${DOCUMENT_API_INTERNAL_KEY}
      WHATSAPP_QR_INTERNAL_KEY: ${WHATSAPP_QR_INTERNAL_KEY}
      DASHBOARD_TO_DOCUMENT_KEY: ${DASHBOARD_TO_DOCUMENT_KEY}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-denunciasAt}
      WHATSAPP_SERVICE_URL: http://whatsapp-service:3003
      DOCUMENT_SERVICE_URL: http://document-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
      RAG_SERVICE_URL: http://rag-service:3006
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION:-us-central1}
      GCS_BUCKET_DOCUMENTOS: ${GCS_BUCKET_DOCUMENTOS:-denunciasat-documentos}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  evolution-api:
    <<: *service-defaults
    image: atendai/evolution-api:v2.2.3
    entrypoint: ["/bin/bash", "-c", "node /patches/patch-lid.js && . ./Docker/scripts/deploy_database.sh && npm run start:prod"]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      WEBHOOK_GLOBAL_URL: http://whatsapp-service:3003/webhook
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBSOCKET_ENABLED: "true"
      WEBSOCKET_GLOBAL_EVENTS: "true"
      CONFIG_SESSION_PHONE_CLIENT: "Ubuntu"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035194821"
    volumes:
      - evolution_data:/evolution/instances
      - ./infrastructure/evolution-api:/patches:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  whatsapp-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/whatsapp-service/Dockerfile
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-denunciasAt}
      CHATBOT_SERVICE_URL: http://chatbot-service:3002
      DASHBOARD_API_URL: http://dashboard-api:3000
      REDIS_URL: redis://redis:6379
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      WHATSAPP_QR_INTERNAL_KEY: ${WHATSAPP_QR_INTERNAL_KEY}
      WHATSAPP_TO_CHATBOT_KEY: ${WHATSAPP_TO_CHATBOT_KEY}
      WHATSAPP_WEBHOOK_HMAC_SECRET: ${WHATSAPP_WEBHOOK_HMAC_SECRET}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCS_BUCKET_EVIDENCIAS: ${GCS_BUCKET_EVIDENCIAS:-denunciasat-evidencias}
      ALLOWED_REMOTE_MEDIA_HOSTS: ${ALLOWED_REMOTE_MEDIA_HOSTS:-evolution-api}
    depends_on:
      evolution-api:
        condition: service_started
      redis:
        condition: service_healthy
      chatbot-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  chatbot-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/chatbot-service/Dockerfile
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION:-us-central1}
      REDIS_URL: redis://redis:6379
      DASHBOARD_API_URL: http://dashboard-api:3000
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      CHATBOT_API_INTERNAL_KEY: ${CHATBOT_API_INTERNAL_KEY}
      WHATSAPP_TO_CHATBOT_KEY: ${WHATSAPP_TO_CHATBOT_KEY}
      RAG_SERVICE_URL: http://rag-service:3006
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER}
      DOCUMENT_SERVICE_URL: http://document-service:3004
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-adc.json
    volumes:
      - ${GCP_ADC_FILE:-./infrastructure/docker/gcp-adc-placeholder.json}:/tmp/gcp-adc.json:ro
    depends_on:
      redis:
        condition: service_healthy
      dashboard-api:
        condition: service_healthy
      rag-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  document-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/document-service/Dockerfile
    ports:
      - "127.0.0.1:3004:3004"
    environment:
      NODE_ENV: production
      PORT: 3004
      DASHBOARD_API_URL: http://dashboard-api:3000
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      DOCUMENT_API_INTERNAL_KEY: ${DOCUMENT_API_INTERNAL_KEY}
      DASHBOARD_TO_DOCUMENT_KEY: ${DASHBOARD_TO_DOCUMENT_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION:-us-central1}
      GCS_BUCKET_EVIDENCIAS: ${GCS_BUCKET_EVIDENCIAS:-denunciasat-evidencias}
      GCS_BUCKET_DOCUMENTOS: ${GCS_BUCKET_DOCUMENTOS:-denunciasat-documentos}
      ALLOWED_REMOTE_MEDIA_HOSTS: ${ALLOWED_REMOTE_MEDIA_HOSTS:-evolution-api}
    depends_on:
      dashboard-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  notification-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    ports:
      - "127.0.0.1:3005:3005"
    environment:
      NODE_ENV: production
      PORT: 3005
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-denunciasAt}
    depends_on:
      evolution-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  rag-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: apps/rag-service/Dockerfile
    ports:
      - "127.0.0.1:3006:3006"
    environment:
      NODE_ENV: production
      PORT: 3006
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_REGION: ${GCP_REGION:-us-central1}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT:-5432}/${DB_NAME}
      DASHBOARD_API_INTERNAL_KEY: ${DASHBOARD_API_INTERNAL_KEY}
      # ADC local para Vertex AI: configurar GCP_ADC_FILE en .env con la ruta al archivo
      # Windows: GCP_ADC_FILE=C:/Users/<user>/AppData/Roaming/gcloud/application_default_credentials.json
      # Linux/Mac: GCP_ADC_FILE=/home/<user>/.config/gcloud/application_default_credentials.json
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-adc.json
    volumes:
      - ${GCP_ADC_FILE:-./infrastructure/docker/gcp-adc-placeholder.json}:/tmp/gcp-adc.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3006/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  frontend:
    <<: *service-defaults
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:8741}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8741}
    ports:
      - "${FRONTEND_PORT:-8742}:3001"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3001"
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://dashboard-api:3000
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:8741}
    depends_on:
      dashboard-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  evolution_data:

networks:
  default:
    name: denunciasat_network
