name: Deploy DenunciasAT

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev

jobs:
  # ── Verificación de tipos e integración del backend ────────────────────────
  backend-check:
    name: Backend — tipos y tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit --project tsconfig.json

      - name: Ejecutar tests (whatsapp-service)
        run: npx jest --testPathPatterns="apps/whatsapp-service" --passWithNoTests --forceExit

  # ── Build del frontend (valida TS + JSX + rutas API) ───────────────────────
  frontend-build:
    name: Frontend — build y tipos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}

  # ── Build y push de imágenes Docker ────────────────────────────────────────
  build-and-push:
    name: Build & Push imágenes
    needs: [backend-check, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Determinar tag
        id: meta
        run: |
          TAG=${GITHUB_SHA::8}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard-api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/dashboard-api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/dashboard-api:latest

      - name: Build chatbot-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/chatbot-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/chatbot-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/chatbot-service:latest

      - name: Build whatsapp-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/whatsapp-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/whatsapp-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/whatsapp-service:latest

      - name: Build document-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/document-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/document-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/document-service:latest

      - name: Build notification-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/notification-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/notification-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/notification-service:latest

      - name: Build rag-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/rag-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/rag-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/rag-service:latest

      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/frontend:latest
          build-args: |
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  # ── Asignar rol Vertex AI al Service Account (idempotente) ────────────────
  grant-vertex-ai-role:
    name: IAM — roles/aiplatform.user
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Agregar roles al Service Account de deploy
        run: |
          gcloud projects add-iam-policy-binding ${{ env.GCP_PROJECT_ID }} \
            --member="serviceAccount:${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --role="roles/aiplatform.user" \
            --condition=None 2>/dev/null || true

      - name: Asignar roles al SA de Compute Engine (VM ADC)
        run: |
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.GCP_PROJECT_ID }} --format='value(projectNumber)')
          CE_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          gcloud projects add-iam-policy-binding ${{ env.GCP_PROJECT_ID }} \
            --member="serviceAccount:${CE_SA}" \
            --role="roles/storage.objectAdmin" \
            --condition=None 2>/dev/null || true
          gcloud projects add-iam-policy-binding ${{ env.GCP_PROJECT_ID }} \
            --member="serviceAccount:${CE_SA}" \
            --role="roles/aiplatform.user" \
            --condition=None 2>/dev/null || true

  # ── Despliegue en la VM ─────────────────────────────────────────────────────
  deploy-vm:
    name: Deploy VM
    needs: [build-and-push, grant-vertex-ai-role]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Verificar secretos de deploy
        run: |
          ERRORS=0
          if [ -z "$VM_USER" ]; then
            echo "::error::Secreto GCP_VM_USER no configurado"
            ERRORS=$((ERRORS+1))
          fi
          if [ -z "$VM_HOST" ]; then
            echo "::error::Secreto GCP_VM_HOST no configurado"
            ERRORS=$((ERRORS+1))
          fi
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Secreto GCP_SSH_PRIVATE_KEY no configurado"
            ERRORS=$((ERRORS+1))
          fi
          [ "$ERRORS" -gt 0 ] && exit 1
          echo "Secretos de deploy presentes — continuando"
        env:
          VM_USER: ${{ secrets.GCP_VM_USER }}
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          SSH_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Deploy via SSH (direct)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=no ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            set -e
            cd /opt/denunciasat
            sudo chmod 644 /opt/denunciasat/.env && sudo chown $USER:$USER /opt/denunciasat/.env

            # Actualizar archivos del repositorio en la VM
            git fetch origin main
            git reset --hard origin/main

            # Generar .env desde GitHub Secrets — sobrescribe cualquier versión manual en la VM
            cat > .env << 'ENVEOF'
          # Base de datos
          DB_HOST=postgres
          DB_PORT=5432
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SYNC=false

          # Autenticación
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=8h
          SEED_ENABLED=false
          SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}

          # IA — GEMINI_API_KEY en desuso desde sesión 46 (migración a Vertex AI + ADC)
          # GEMINI_API_KEY=unused

          # GCP / GCS
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION=${{ secrets.GCP_REGION }}
          GCS_BUCKET_EVIDENCIAS=${{ secrets.GCS_BUCKET_EVIDENCIAS }}
          GCS_BUCKET_DOCUMENTOS=${{ secrets.GCS_BUCKET_DOCUMENTOS }}

          # Evolution API / WhatsApp
          EVOLUTION_API_KEY=${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE_NAME=${{ secrets.EVOLUTION_INSTANCE_NAME }}
          EVOLUTION_API_URL=http://evolution-api:8080

          # Claves internas entre servicios
          DASHBOARD_API_INTERNAL_KEY=${{ secrets.DASHBOARD_API_INTERNAL_KEY }}
          CHATBOT_API_INTERNAL_KEY=${{ secrets.CHATBOT_API_INTERNAL_KEY }}
          DOCUMENT_API_INTERNAL_KEY=${{ secrets.DOCUMENT_API_INTERNAL_KEY }}
          WHATSAPP_QR_INTERNAL_KEY=${{ secrets.WHATSAPP_QR_INTERNAL_KEY }}
          DASHBOARD_TO_DOCUMENT_KEY=${{ secrets.DASHBOARD_TO_DOCUMENT_KEY }}
          WHATSAPP_TO_CHATBOT_KEY=${{ secrets.WHATSAPP_TO_CHATBOT_KEY }}
          WHATSAPP_WEBHOOK_HMAC_SECRET=${{ secrets.WHATSAPP_WEBHOOK_HMAC_SECRET }}

          # Frontend / URLs públicas
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}

          # Notificaciones
          ADMIN_WHATSAPP_NUMBER=${{ secrets.ADMIN_WHATSAPP_NUMBER }}

          # URLs internas de servicios (Docker networking — no modificar)
          DASHBOARD_API_URL=http://dashboard-api:3000
          CHATBOT_SERVICE_URL=http://chatbot-service:3002
          WHATSAPP_SERVICE_URL=http://whatsapp-service:3003
          DOCUMENT_SERVICE_URL=http://document-service:3004
          NOTIFICATION_SERVICE_URL=http://notification-service:3005
          RAG_SERVICE_URL=http://rag-service:3006
          ALLOWED_REMOTE_MEDIA_HOSTS=evolution-api

          # Puertos expuestos al host
          API_PORT=8741
          FRONTEND_PORT=8742
          ENVEOF
            chmod 600 .env

            # Instalar docker compose plugin si no está disponible
            if ! docker compose version &>/dev/null 2>&1; then
              COMPOSE_VERSION="v2.24.6"
              COMPOSE_DIR="${DOCKER_CLI_PLUGINS_HOME:-$HOME/.docker/cli-plugins}"
              mkdir -p "$COMPOSE_DIR"
              curl -SL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o "$COMPOSE_DIR/docker-compose"
              chmod +x "$COMPOSE_DIR/docker-compose"
            fi

            # Diagnóstico: versiones de Docker y Compose plugin
            docker version
            docker compose version

            # Detectar si la contraseña de BD cambió y limpiar volumen para evitar auth failure
            DB_USER_VAL=${{ secrets.DB_USER }}
            if docker inspect -f '{{.State.Running}}' denunciasat-postgres-1 >/dev/null 2>&1; then
              CURRENT_DB_CHECK=$(docker exec denunciasat-postgres-1 \
                psql -U "$DB_USER_VAL" -c "SELECT 1" 2>&1 || echo "AUTH_FAILED")
              if echo "$CURRENT_DB_CHECK" | grep -q "AUTH_FAILED\|password authentication\|role.*does not exist"; then
                echo "Contraseña de BD cambió o usuario no existe — limpiando volumen de postgres"
                docker compose -f docker-compose.prod.yml stop postgres 2>/dev/null || true
                docker volume rm denunciasat_postgres_data 2>/dev/null || true
              fi
            fi

            # Detener contenedores existentes antes de recrear la red
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

            # Forzar eliminación de la red por cualquier nombre que tenga
            docker network ls --filter "label=com.docker.compose.network" -q | \
              xargs -r docker network rm 2>/dev/null || true

            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}
            export GCP_REGION=${{ env.GCP_REGION }}

            gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

            # Limpiar imágenes y capas Docker sin uso para liberar espacio en disco
            docker image prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            docker compose -f docker-compose.prod.yml pull

            # Levantar Postgres primero para garantizar migraciones antes del resto de servicios
            docker compose -f docker-compose.prod.yml up -d postgres

            # Esperar a Postgres antes de ejecutar migraciones
            ATTEMPTS=20
            while [ "$ATTEMPTS" -gt 0 ]; do
              if docker compose -f docker-compose.prod.yml exec -T postgres pg_isready -U "$DB_USER_VAL" >/dev/null 2>&1; then
                break
              fi
              echo "Esperando a Postgres para migraciones..."
              ATTEMPTS=$((ATTEMPTS-1))
              sleep 2
            done
            if [ "$ATTEMPTS" -eq 0 ]; then
              echo "Postgres no respondió a tiempo — abortando despliegue"
              exit 1
            fi

            # Ejecutar migraciones de BD (idempotente — CREATE TABLE IF NOT EXISTS)
            DB_NAME_VAL=${{ secrets.DB_NAME }}
            docker compose -f docker-compose.prod.yml exec -T postgres \
              psql -U "$DB_USER_VAL" -d "$DB_NAME_VAL" -f /migrations/001_feedback_denuncias.sql || true

            # Levantar el resto de servicios
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps

            # Verificar que al menos 8 servicios estén corriendo tras 30 s
            echo "Esperando 30 s para que los contenedores arranquen..."
            sleep 30
            RUNNING=$(docker compose -f docker-compose.prod.yml ps --status running --quiet | wc -l)
            echo "Servicios corriendo: ${RUNNING}"
            if [ "$RUNNING" -lt 8 ]; then
              echo "::error::Solo ${RUNNING}/10 servicios están corriendo — falla el deploy"
              docker compose -f docker-compose.prod.yml ps
              docker compose -f docker-compose.prod.yml logs --tail=30 || true
              exit 1
            fi

            # Auto-seed del usuario administrador (idempotente — 409 = ya existe, ambos OK)
            sed -i 's/^SEED_ENABLED=.*/SEED_ENABLED=true/' .env
            docker compose -f docker-compose.prod.yml up -d dashboard-api
            echo "Esperando a que dashboard-api esté listo para el seed..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8741/health >/dev/null 2>&1; then break; fi
              sleep 5
            done
            SEED_STATUS=$(curl -s -o /tmp/seed_response -w "%{http_code}" -X POST http://localhost:8741/auth/seed 2>/dev/null || echo "000")
            SEED_BODY=$(cat /tmp/seed_response 2>/dev/null || echo "")
            if [ "$SEED_STATUS" = "201" ] || [ "$SEED_STATUS" = "409" ]; then
              echo "Seed completado correctamente (status ${SEED_STATUS})"
            else
              echo "Seed devolvió status ${SEED_STATUS}: ${SEED_BODY} — verificar manualmente (no es error crítico)"
            fi
            sed -i 's/^SEED_ENABLED=.*/SEED_ENABLED=false/' .env
            docker compose -f docker-compose.prod.yml up -d dashboard-api

            # Diagnóstico: mostrar logs del dashboard-api si falla el healthcheck
            docker compose -f docker-compose.prod.yml logs --tail=50 dashboard-api || true
          EOF

