name: Deploy DenunciasAT

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev

jobs:
  # ── Verificación de tipos e integración del backend ────────────────────────
  backend-check:
    name: Backend — tipos y tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit --project tsconfig.json

      - name: Ejecutar tests (whatsapp-service)
        run: npx jest --testPathPatterns="apps/whatsapp-service" --passWithNoTests --forceExit

  # ── Build del frontend (valida TS + JSX + rutas API) ───────────────────────
  frontend-build:
    name: Frontend — build y tipos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}

  # ── Build y push de imágenes Docker ────────────────────────────────────────
  build-and-push:
    name: Build & Push imágenes
    needs: [backend-check, frontend-build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Determinar tag
        id: meta
        run: |
          TAG=${GITHUB_SHA::8}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configurar Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/dashboard-api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/dashboard-api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/dashboard-api:latest

      - name: Build chatbot-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/chatbot-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/chatbot-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/chatbot-service:latest

      - name: Build whatsapp-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/whatsapp-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/whatsapp-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/whatsapp-service:latest

      - name: Build document-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/document-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/document-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/document-service:latest

      - name: Build notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/notification-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/notification-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/notification-service:latest

      - name: Build rag-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/rag-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/rag-service:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/rag-service:latest

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/frontend:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/denunciasat/frontend:latest
          build-args: |
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  # ── Despliegue en la VM ─────────────────────────────────────────────────────
  deploy-vm:
    name: Deploy VM
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Verificar secretos de deploy
        run: |
          ERRORS=0
          if [ -z "$VM_USER" ]; then
            echo "::error::Secreto GCP_VM_USER no configurado"
            ERRORS=$((ERRORS+1))
          fi
          if [ -z "$VM_HOST" ]; then
            echo "::error::Secreto GCP_VM_HOST no configurado"
            ERRORS=$((ERRORS+1))
          fi
          if [ -z "$SSH_KEY" ]; then
            echo "::error::Secreto GCP_SSH_PRIVATE_KEY no configurado"
            ERRORS=$((ERRORS+1))
          fi
          [ "$ERRORS" -gt 0 ] && exit 1
          echo "Secretos de deploy presentes — continuando"
        env:
          VM_USER: ${{ secrets.GCP_VM_USER }}
          VM_HOST: ${{ secrets.GCP_VM_HOST }}
          SSH_KEY: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Deploy via SSH (direct)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh -o StrictHostKeyChecking=no ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            set -e
            cd /opt/denunciasat

            # Generar .env desde GitHub Secrets — sobrescribe cualquier versión manual en la VM
            cat > .env << 'ENVEOF'
          # Base de datos
          DB_HOST=postgres
          DB_PORT=5432
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SYNC=false

          # Autenticación
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=8h
          SEED_ENABLED=false
          SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}

          # IA
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

          # GCP / GCS
          GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION=${{ secrets.GCP_REGION }}
          GCS_BUCKET_EVIDENCIAS=${{ secrets.GCS_BUCKET_EVIDENCIAS }}
          GCS_BUCKET_DOCUMENTOS=${{ secrets.GCS_BUCKET_DOCUMENTOS }}

          # Evolution API / WhatsApp
          EVOLUTION_API_KEY=${{ secrets.EVOLUTION_API_KEY }}
          EVOLUTION_INSTANCE_NAME=${{ secrets.EVOLUTION_INSTANCE_NAME }}
          EVOLUTION_API_URL=http://evolution-api:8080

          # Claves internas entre servicios
          DASHBOARD_API_INTERNAL_KEY=${{ secrets.DASHBOARD_API_INTERNAL_KEY }}
          CHATBOT_API_INTERNAL_KEY=${{ secrets.CHATBOT_API_INTERNAL_KEY }}
          DOCUMENT_API_INTERNAL_KEY=${{ secrets.DOCUMENT_API_INTERNAL_KEY }}
          WHATSAPP_QR_INTERNAL_KEY=${{ secrets.WHATSAPP_QR_INTERNAL_KEY }}
          DASHBOARD_TO_DOCUMENT_KEY=${{ secrets.DASHBOARD_TO_DOCUMENT_KEY }}
          WHATSAPP_TO_CHATBOT_KEY=${{ secrets.WHATSAPP_TO_CHATBOT_KEY }}
          WHATSAPP_WEBHOOK_HMAC_SECRET=${{ secrets.WHATSAPP_WEBHOOK_HMAC_SECRET }}

          # Frontend / URLs públicas
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}

          # Notificaciones
          ADMIN_WHATSAPP_NUMBER=${{ secrets.ADMIN_WHATSAPP_NUMBER }}

          # URLs internas de servicios (Docker networking — no modificar)
          DASHBOARD_API_URL=http://dashboard-api:3000
          CHATBOT_SERVICE_URL=http://chatbot-service:3002
          WHATSAPP_SERVICE_URL=http://whatsapp-service:3003
          DOCUMENT_SERVICE_URL=http://document-service:3004
          NOTIFICATION_SERVICE_URL=http://notification-service:3005
          RAG_SERVICE_URL=http://rag-service:3006
          ALLOWED_REMOTE_MEDIA_HOSTS=evolution-api

          # Puertos expuestos al host
          API_PORT=8741
          FRONTEND_PORT=8742
          ENVEOF
            chmod 600 .env

            # Instalar docker compose plugin si no está disponible
            if ! docker compose version &>/dev/null 2>&1; then
              COMPOSE_VERSION="v2.24.6"
              COMPOSE_DIR="${DOCKER_CLI_PLUGINS_HOME:-$HOME/.docker/cli-plugins}"
              mkdir -p "$COMPOSE_DIR"
              curl -SL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o "$COMPOSE_DIR/docker-compose"
              chmod +x "$COMPOSE_DIR/docker-compose"
            fi

            # Diagnóstico: versiones de Docker y Compose plugin
            docker version
            docker compose version

            # Detener contenedores existentes antes de recrear la red
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

            # Forzar eliminación de la red por cualquier nombre que tenga
            docker network ls --filter "label=com.docker.compose.network" -q | \
              xargs -r docker network rm 2>/dev/null || true

            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            export GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}

            gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

            # Limpiar imágenes y capas Docker sin uso para liberar espacio en disco
            docker image prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker compose -f docker-compose.prod.yml ps

            # Diagnóstico: mostrar logs del dashboard-api si falla el healthcheck
            docker compose -f docker-compose.prod.yml logs --tail=50 dashboard-api || true
          EOF

  # ── Verificación post-despliegue ───────────────────────────────────────────
  verify:
    name: Verify
    needs: deploy-vm
    runs-on: ubuntu-latest
    steps:
      - name: Healthcheck dashboard-api con reintentos
        run: |
          for i in $(seq 1 8); do
            echo "Intento $i/8..."
            if curl -sf --max-time 10 "${{ secrets.APP_PUBLIC_URL }}/health"; then
              echo "dashboard-api OK"
              exit 0
            fi
            echo "Intento $i fallido — esperando 15s..."
            sleep 15
          done
          echo "::error::dashboard-api no respondió tras 8 intentos (2 min)"
          exit 1
